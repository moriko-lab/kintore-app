<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PUMP">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f2f7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<title>PUMP</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="header">
  <button id="back-btn" class="icon-btn invisible" aria-label="前日">&#8249;</button>
  <h1 id="title">PUMP</h1>
  <button id="next-btn" class="icon-btn invisible" aria-label="翌日">&#8250;</button>
</header>

<div id="pull-indicator" class="hidden">引っ張って更新</div>

<main id="view"></main>

<div id="timer-bar" class="hidden">
  <span id="timer-label">休憩</span>
  <span id="timer-remain">0:00</span>
  <button id="timer-stop" class="timer-btn">停止</button>
</div>

<nav id="tabbar">
  <button data-tab="calendar" class="tab active">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <rect x="3.5" y="5" width="17" height="15.5" rx="3.5"/>
      <line x1="3.5" y1="10" x2="20.5" y2="10"/>
      <line x1="8" y1="3" x2="8" y2="6.5"/>
      <line x1="16" y1="3" x2="16" y2="6.5"/>
    </svg>
    <span>カレンダー</span>
  </button>
  <button data-tab="graph" class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4,17.5 9.5,11.5 13.5,14.5 20,6.5"/>
      <circle cx="20" cy="6.5" r="1.4" fill="currentColor" stroke="none"/>
    </svg>
    <span>グラフ</span>
  </button>
  <button data-tab="settings" class="tab">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
      <circle cx="12" cy="12" r="3.2"/>
      <path d="M12 3.5v2.5M12 18v2.5M3.5 12H6M18 12h2.5M6 6l1.8 1.8M16.2 16.2L18 18M18 6l-1.8 1.8M7.8 16.2L6 18"/>
    </svg>
    <span>設定</span>
  </button>
</nav>

<div id="modal-root"></div>

<script src="db.js"></script>
<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js');
}
</script>
</body>
</html>
